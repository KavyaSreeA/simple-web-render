<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Touch to Shake</title>
	<style>
		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			font-family: Arial, sans-serif;
			background: #f4f6fb;
		}

		#object {
			width: 120px;
			height: 120px;
			border-radius: 12px;
			background: #4f46e5;
			touch-action: manipulation;
		}

		.shake {
			animation: shake 0.35s linear;
		}

		@keyframes shake {
			0%, 100% { transform: translateX(0); }
			20% { transform: translateX(-8px); }
			40% { transform: translateX(8px); }
			60% { transform: translateX(-8px); }
			80% { transform: translateX(8px); }
		}
	</style>
</head>
<body>
	<div id="object"></div>

	<script>
		const object = document.getElementById("object");

		function triggerShake() {
			object.classList.remove("shake");
			void object.offsetWidth;
			object.classList.add("shake");
		}

		if (window.PointerEvent) {
			object.addEventListener("pointerdown", triggerShake);
		} else {
			object.addEventListener("touchstart", triggerShake, { passive: true });
		}

		object.addEventListener("click", triggerShake);
	</script>
</body>
</html>
